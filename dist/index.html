<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cozy Critters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a1f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    #game-container canvas {
      display: block;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DzY9qmSY.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="debug" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);color:#ff4444;font:12px monospace;padding:8px;max-height:40vh;overflow:auto;display:none;z-index:9999"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var d = document.getElementById('debug');
      d.style.display = 'block';
      d.innerHTML += '<div>' + msg + ' at ' + (url||'').split('/').pop() + ':' + line + '</div>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('debug');
      d.style.display = 'block';
      d.innerHTML += '<div>Promise: ' + (e.reason?.message || e.reason) + '</div>';
    });
  </script>
</body>
</html>
